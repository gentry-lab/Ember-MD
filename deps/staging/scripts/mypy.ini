[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unreachable = True
show_error_codes = True

# Scientific libraries without type stubs — need both top-level and submodule patterns
[mypy-MDAnalysis]
ignore_missing_imports = True
[mypy-MDAnalysis.*]
ignore_missing_imports = True
[mypy-openmm]
ignore_missing_imports = True
[mypy-openmm.*]
ignore_missing_imports = True
[mypy-openff.*]
ignore_missing_imports = True
[mypy-openmmforcefields.*]
ignore_missing_imports = True
[mypy-openmmtools.*]
ignore_missing_imports = True
[mypy-pdbfixer]
ignore_missing_imports = True
[mypy-pdbfixer.*]
ignore_missing_imports = True
[mypy-openbabel.*]
ignore_missing_imports = True
[mypy-vina.*]
ignore_missing_imports = True
[mypy-Bio.*]
ignore_missing_imports = True
[mypy-dimorphite_dl.*]
ignore_missing_imports = True
[mypy-pymbar.*]
ignore_missing_imports = True
[mypy-sascorer]
ignore_missing_imports = True
[mypy-sascorer.*]
ignore_missing_imports = True
[mypy-rdkit.*]
ignore_missing_imports = True
[mypy-meeko]
ignore_missing_imports = True
[mypy-meeko.*]
ignore_missing_imports = True
[mypy-molscrub]
ignore_missing_imports = True
[mypy-molscrub.*]
ignore_missing_imports = True
[mypy-mdtraj.*]
ignore_missing_imports = True
[mypy-propka.*]
ignore_missing_imports = True
[mypy-sklearn]
ignore_missing_imports = True
[mypy-sklearn.*]
ignore_missing_imports = True
[mypy-scipy]
ignore_missing_imports = True
[mypy-scipy.*]
ignore_missing_imports = True
[mypy-numpy]
ignore_missing_imports = True
[mypy-numpy.*]
ignore_missing_imports = True
[mypy-matplotlib]
ignore_missing_imports = True
[mypy-matplotlib.*]
ignore_missing_imports = True
[mypy-reportlab.*]
ignore_missing_imports = True
[mypy-PyPDF2.*]
ignore_missing_imports = True
[mypy-PIL.*]
ignore_missing_imports = True

# Tier 1 scripts — full annotations, suppress only unresolvable library issues
[mypy-run_md_simulation]
disable_error_code = name-defined, no-any-return, var-annotated, assignment
[mypy-run_abfe]
disable_error_code = name-defined, assignment, arg-type, unreachable
[mypy-detect_pdb_ligands]
disable_error_code = assignment
[mypy-extract_xray_ligand]
disable_error_code = attr-defined, unreachable, assignment
[mypy-run_vina_docking]
disable_error_code = attr-defined, unreachable, assignment, no-any-return
[mypy-enumerate_protonation]
disable_error_code = attr-defined, unreachable
[mypy-generate_conformers]
disable_error_code = attr-defined

# Tier 2 scripts — function signatures annotated, suppress internal type noise
# (numpy array/list reassignments, matplotlib stub mismatches, conditional imports)
[mypy-analyze_rmsd]
disable_error_code = assignment, name-defined, arg-type, index
[mypy-analyze_rmsf]
disable_error_code = assignment, dict-item
[mypy-analyze_hbonds]
disable_error_code = assignment, attr-defined, arg-type, return-value
[mypy-analyze_contacts]
disable_error_code = assignment, arg-type, return-value, call-overload, var-annotated
[mypy-analyze_torsions]
disable_error_code = assignment, attr-defined, arg-type, no-any-return, unreachable, call-overload, var-annotated
[mypy-analyze_sse]
disable_error_code = assignment, arg-type, dict-item
[mypy-analyze_ligand_props]
disable_error_code = assignment, arg-type, union-attr, var-annotated, attr-defined
[mypy-cluster_trajectory]
disable_error_code = assignment, attr-defined, arg-type, return-value, call-overload, no-any-return
[mypy-map_binding_site]
disable_error_code = assignment, attr-defined, call-overload, no-untyped-def
[mypy-compute_surface_props]
disable_error_code = assignment
[mypy-generate_md_report]
disable_error_code = assignment, arg-type, attr-defined, return-value, call-overload, import-not-found
[mypy-smiles_to_3d]
disable_error_code = attr-defined, union-attr, unreachable
[mypy-smiles_to_sdf]
disable_error_code = attr-defined, unreachable, assignment
[mypy-scan_sdf_directory]
disable_error_code = attr-defined

# Legacy scripts — skip
[mypy-train]
ignore_errors = True
[mypy-train_data_process]
ignore_errors = True
[mypy-gen_all]
ignore_errors = True
[mypy-gen_from_pdb]
ignore_errors = True
